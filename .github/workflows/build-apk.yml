name: Build zapret2-orchestra APK

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: 'SDK download URL'
        required: false
        default: 'https://downloads.openwrt.org/releases/25.12.5/targets/mediatek/filogic/openwrt-sdk-25.12.5-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst'
      sdk_sha256:
        description: 'Expected SHA256 of the SDK archive'
        required: false
        default: 'ff4a38a397caa2cfe1c39e18f84ddede14878221b3593c3f2c4cfe24e3ec4c25'

env:
  SDK_URL: ${{ inputs.sdk_url || 'https://downloads.openwrt.org/releases/25.12.5/targets/mediatek/filogic/openwrt-sdk-25.12.5-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst' }}
  SDK_SHA256: ${{ inputs.sdk_sha256 || 'ff4a38a397caa2cfe1c39e18f84ddede14878221b3593c3f2c4cfe24e3ec4c25' }}
  SDK_DIR: openwrt-sdk-25.12.5-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout zapret2-port
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install host dependencies
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y zstd binutils file

      - name: Download and verify SDK
        run: |
          set -eu
          ARCHIVE="$(basename "$SDK_URL")"
          echo "Downloading SDK: $SDK_URL"
          curl -fSL --retry 5 --retry-delay 5 -o "$ARCHIVE" "$SDK_URL"
          echo "Verifying SHA256..."
          ACTUAL=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          echo "Expected: $SDK_SHA256"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$SDK_SHA256" ]; then
            echo "ERROR: SHA256 mismatch"
            exit 1
          fi
          echo "Extracting SDK..."
          tar --zstd -xf "$ARCHIVE"
          rm -f "$ARCHIVE"
          echo "SDK ready at $SDK_DIR"

      - name: Verify SDK layout
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          test -d include || { echo "ERROR: SDK include/ not found"; exit 1; }
          test -f include/package.mk || { echo "ERROR: include/package.mk not found"; exit 1; }
          test -d staging_dir/host/bin || { echo "ERROR: staging_dir/host/bin not found"; exit 1; }
          # The OpenWrt SDK ships a prebuilt host apk used by the build
          # system to produce .apk packages. Verify it is present and runs.
          # Do not hard-reject on a specific version; the SDK pins the
          # correct apk for this OpenWrt release.
          test -x staging_dir/host/bin/apk || {
            echo "ERROR: SDK host apk not found or not executable"
            echo "staging_dir/host/bin contents:"
            ls -la staging_dir/host/bin/ 2>&1 | head -40 || true
            exit 1
          }
          echo "=== SDK host apk ==="
          staging_dir/host/bin/apk --version
          echo "SDK layout verified"

      - name: Prepare package tree
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          cp -r "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra" package/zapret2-orchestra
          cp -r "$GITHUB_WORKSPACE/openwrt/zapret2" package/zapret2
          echo "Package tree prepared:"
          find package -maxdepth 2 -name Makefile | sort

      - name: Init feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          if [ -f feeds.conf.default ]; then
            cp feeds.conf.default feeds.conf
          else
            echo "ERROR: feeds.conf.default not found"
            exit 1
          fi
          # Rewrite git.openwrt.org URLs to GitHub mirrors. Only the URL
          # prefix is replaced, so any branch/revision suffix (e.g.
          # ";openwrt-25.12") after the repo URL is preserved. Do not
          # suppress errors: a feeds failure must stop the workflow here
          # rather than surface later as an opaque package build error.
          sed -i \
            -e 's|https://git.openwrt.org/feed/|https://github.com/openwrt/|' \
            -e 's|https://git.openwrt.org/project/|https://github.com/openwrt/|' \
            -e 's|https://git.openwrt.org/openwrt/|https://github.com/openwrt/|' \
            feeds.conf
          echo "=== feeds.conf ==="
          cat feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Init config
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          make defconfig
          echo "=== .config excerpt (zapret) ==="
          grep -i zapret .config || echo "(no zapret in config)"

      - name: Build zapret2 (parallel)
        id: build-zapret2
        continue-on-error: true
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          echo "Building zapret2 with -j$(nproc)..."
          make package/zapret2/compile -j$(nproc) BUILD_LOG=1
          echo "zapret2 build succeeded"

      - name: Build zapret2 (retry single-threaded with verbose)
        if: steps.build-zapret2.outcome == 'failure'
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          echo "Retrying zapret2 with -j1 V=sc..."
          make package/zapret2/compile -j1 V=sc BUILD_LOG=1
          echo "zapret2 single-threaded build succeeded"

      - name: Build zapret2-orchestra (parallel)
        id: build-orchestra
        continue-on-error: true
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          echo "Building zapret2-orchestra with -j$(nproc)..."
          make package/zapret2-orchestra/compile -j$(nproc) BUILD_LOG=1
          echo "zapret2-orchestra build succeeded"

      - name: Build zapret2-orchestra (retry single-threaded with verbose)
        if: steps.build-orchestra.outcome == 'failure'
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          echo "Retrying zapret2-orchestra with -j1 V=sc..."
          make package/zapret2-orchestra/compile -j1 V=sc BUILD_LOG=1
          echo "zapret2-orchestra single-threaded build succeeded"

      - name: Locate built APKs
        id: locate-apk
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          ORCH_APK=$(find bin/packages -name 'zapret2-orchestra-*.apk' -type f -print -quit)
          if [ -z "$ORCH_APK" ]; then
            echo "ERROR: no zapret2-orchestra APK found in bin/packages/"
            find bin/packages -name '*orchestra*' -type f -print || true
            exit 1
          fi
          Z2_APK=$(find bin/packages -name 'zapret2-*.apk' ! -name 'zapret2-orchestra-*' -type f -print -quit)
          if [ -z "$Z2_APK" ]; then
            echo "ERROR: no zapret2 APK found in bin/packages/"
            find bin/packages -name 'zapret2*' -type f -print || true
            exit 1
          fi
          echo "Orchestra APK: $ORCH_APK"
          echo "Zapret2 APK: $Z2_APK"
          echo "orch_apk_path=$ORCH_APK" >> "$GITHUB_OUTPUT"
          echo "orch_apk_name=$(basename "$ORCH_APK")" >> "$GITHUB_OUTPUT"
          echo "z2_apk_path=$Z2_APK" >> "$GITHUB_OUTPUT"
          echo "z2_apk_name=$(basename "$Z2_APK")" >> "$GITHUB_OUTPUT"

      - name: Inspect and verify APKs
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          SDK_ABS="$GITHUB_WORKSPACE/$SDK_DIR"
          APK_BIN="$SDK_ABS/staging_dir/host/bin/apk"
          ORCH_APK="$SDK_ABS/${{ steps.locate-apk.outputs.orch_apk_path }}"
          Z2_APK="$SDK_ABS/${{ steps.locate-apk.outputs.z2_apk_path }}"
          ART_DIR="$GITHUB_WORKSPACE/artifacts"

          echo "APK_BIN: $APK_BIN"
          test -x "$APK_BIN" || { echo "ERROR: $APK_BIN not executable"; exit 1; }
          "$APK_BIN" --version

          mkdir -p /tmp/apk-orch /tmp/apk-z2 "$ART_DIR"

          echo "=== Orchestra APK ==="
          ls -lh "$ORCH_APK"
          file "$ORCH_APK"

          echo "=== Zapret2 APK ==="
          ls -lh "$Z2_APK"
          file "$Z2_APK"

          echo "=== Extract APKs (apk --allow-untrusted extract --destination) ==="
          # apk info --description and apk manifest require an installed
          # database (they do not read a package file).  apk extract
          # --destination is the reliable way to unpack a local .apk.
          # The SDK builds packages with a locally generated signing key
          # that is not in the trusted keyring, so apk rejects them with
          # "UNTRUSTED signature" (exit 99) unless --allow-untrusted is
          # passed.  We are only inspecting locally built artifacts (not
          # installing them), so trusting the signature here is safe and
          # is the same flag the OpenWrt build system uses when staging
          # its own packages.  Extraction failure is fatal: a silent WARN
          # here would surface downstream as a misleading "nfqws2 not
          # found" contract failure and hide the real cause.
          if "$APK_BIN" --allow-untrusted extract --destination /tmp/apk-orch "$ORCH_APK"; then
            echo "OK: orchestra extracted"
          else
            echo "FAIL: orchestra apk extract failed (exit $?)"
            exit 1
          fi
          if "$APK_BIN" --allow-untrusted extract --destination /tmp/apk-z2 "$Z2_APK"; then
            echo "OK: zapret2 extracted"
          else
            echo "FAIL: zapret2 apk extract failed (exit $?)"
            exit 1
          fi

          # Dump file inventories from the extracted trees for the artifacts
          echo "=== Extracted orchestra file listing ==="
          find /tmp/apk-orch -type f 2>/dev/null | sort > "$ART_DIR/orchestra-files.txt"
          cat "$ART_DIR/orchestra-files.txt"

          echo "=== Extracted zapret2 file listing ==="
          find /tmp/apk-z2 -type f 2>/dev/null | sort > "$ART_DIR/zapret2-files.txt"
          cat "$ART_DIR/zapret2-files.txt"

          echo "=== Contract: zapret2 APK contains nfqws2 ==="
          NFQWS2=""
          if find /tmp/apk-z2 -name 'nfqws2' -type f 2>/dev/null | grep -q .; then
            NFQWS2=$(find /tmp/apk-z2 -name 'nfqws2' -type f -print -quit)
            echo "OK: nfqws2 extracted at $NFQWS2"
          elif grep -q '/opt/zapret2/nfq2/nfqws2' "$ART_DIR/zapret2-files.txt" 2>/dev/null; then
            echo "OK: nfqws2 listed in manifest"
            NFQWS2="manifest-only"
          else
            echo "FAIL: nfqws2 not found in zapret2 APK"
            cat "$ART_DIR/zapret2-files.txt" 2>/dev/null || true
            exit 1
          fi

          echo "=== Contract: nfqws2 is AArch64 ELF ==="
          if [ -n "$NFQWS2" ] && [ "$NFQWS2" != "manifest-only" ] && [ -f "$NFQWS2" ]; then
            file "$NFQWS2" > "$ART_DIR/nfqws2-file-type.txt" 2>&1
            cat "$ART_DIR/nfqws2-file-type.txt"
            if file "$NFQWS2" | grep -q 'ELF.*aarch64'; then
              echo "OK: nfqws2 is AArch64 ELF"
            else
              echo "FAIL: nfqws2 is not AArch64 ELF"
              exit 1
            fi
            echo "--- readelf -d ---"
            readelf -d "$NFQWS2" 2>/dev/null || true
            readelf -d "$NFQWS2" > "$ART_DIR/nfqws2-readelf.txt" 2>&1 || true
          else
            echo "WARN: nfqws2 not extracted, skipping ELF check"
          fi

          echo "=== Contract: orchestra APK has no nfqws2 ==="
          if find /tmp/apk-orch -name 'nfqws2' -type f 2>/dev/null | grep -q .; then
            echo "FAIL: nfqws2 found in orchestra APK"
            exit 1
          elif grep -q '/opt/zapret2/nfq2/nfqws2' "$ART_DIR/orchestra-files.txt" 2>/dev/null; then
            echo "FAIL: nfqws2 listed in orchestra manifest"
            exit 1
          else
            echo "OK: no nfqws2 in orchestra APK"
          fi

          echo "=== Contract: orchestra depends on zapret2 (Makefile DEPENDS) ==="
          if grep -q 'zapret2' "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/Makefile"; then
            echo "OK: orchestra Makefile references zapret2 in DEPENDS"
          else
            echo "FAIL: orchestra Makefile does not reference zapret2"
            cat "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/Makefile"
            exit 1
          fi

          echo "=== Contract: no ../../zapret2-core in any Makefile ==="
          if grep -r '\.\./\.\./zapret2-core' package/ 2>/dev/null; then
            echo "FAIL: ../../zapret2-core reference found"
            exit 1
          else
            echo "OK: no ../../zapret2-core references"
          fi

          echo "=== Contract: orchestra conffiles ==="
          for f in /etc/zapret2-orchestra/blocked.json /etc/zapret2-orchestra/learned.json /etc/zapret2-orchestra/manual-locks.json /etc/zapret2-orchestra/whitelist.json; do
            if grep -F -q "$f" "$ART_DIR/orchestra-files.txt" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f not found in orchestra APK"
            fi
          done

          echo "=== Contract: orchestra required files ==="
          for f in \
            /usr/share/rpcd/ucode/zapret2.orchestra \
            /usr/share/rpcd/acl.d/zapret2-orchestra.json \
            /usr/share/zapret2-orchestra/generate-preload.uc \
            /usr/sbin/zapret2-orchestra-preload \
            /etc/init.d/zapret2-orchestra \
            /opt/zapret2/lua/orchestra-extra/init.lua
          do
            if grep -F -q "$f" "$ART_DIR/orchestra-files.txt" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f not found in orchestra APK"
            fi
          done

          echo "=== Contract: zapret2 required files ==="
          for f in \
            /opt/zapret2/nfq2/nfqws2 \
            /opt/zapret2/ip2net/ip2net \
            /opt/zapret2/mdig/mdig \
            /opt/zapret2/lua/zapret-lib.lua \
            /opt/zapret2/lua/zapret-antidpi.lua \
            /opt/zapret2/lua/zapret-auto.lua \
            /etc/init.d/zapret2
          do
            if grep -F -q "$f" "$ART_DIR/zapret2-files.txt" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f not found in zapret2 APK"
            fi
          done

          echo "=== Contract: no .ipk files ==="
          if find bin/packages -name '*.ipk' -type f 2>/dev/null | grep -q .; then
            echo "FAIL: .ipk files found"
            find bin/packages -name '*.ipk' -type f
            exit 1
          else
            echo "OK: no .ipk files"
          fi

          echo "=== Contract: zapret2 architecture is target (not PKGARCH:=all) ==="
          if grep -q '^\s*PKGARCH\s*:=\s*all\b' "$GITHUB_WORKSPACE/openwrt/zapret2/Makefile" 2>/dev/null; then
            echo "FAIL: zapret2 Makefile declares PKGARCH:=all"
            exit 1
          else
            echo "OK: zapret2 is target-arch (no PKGARCH:=all)"
          fi

          echo "=== Contract: orchestra architecture is PKGARCH:=all ==="
          if grep -q '^\s*PKGARCH\s*:=\s*all\b' "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/Makefile" 2>/dev/null; then
            echo "OK: orchestra architecture is all"
          else
            echo "WARN: orchestra PKGARCH:=all not found or formatted differently"
          fi

          echo "=== All contract checks complete ==="

      - name: Stage 2 APK audit
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          ART_DIR="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$ART_DIR"
          # /tmp/apk-orch and /tmp/apk-z2 were populated by the previous step
          # with `apk --allow-untrusted extract --destination`. They persist
          # across steps on the same runner.

          echo "=== SHA256 of built APKs ==="
          {
            sha256sum "$GITHUB_WORKSPACE/$SDK_DIR/${{ steps.locate-apk.outputs.orch_apk_path }}"
            sha256sum "$GITHUB_WORKSPACE/$SDK_DIR/${{ steps.locate-apk.outputs.z2_apk_path }}"
          } | tee "$ART_DIR/apk-sha256.txt"

          echo "=== ELF inventory: every ELF file in the zapret2 APK ==="
          # An ELF file is a host (x86_64) binary leaked into the target
          # package; every executable shipped by zapret2 must be an aarch64
          # target binary. List them all and reject any x86_64 ELF.
          find /tmp/apk-z2 -type f -print0 | xargs -0 file 2>/dev/null | grep -i 'ELF' > "$ART_DIR/zapret2-elf-inventory.txt" || true
          cat "$ART_DIR/zapret2-elf-inventory.txt"
          if grep -i 'x86-64' "$ART_DIR/zapret2-elf-inventory.txt" >/dev/null 2>&1; then
            echo "FAIL: x86_64 ELF found in zapret2 APK"
            grep -i 'x86-64' "$ART_DIR/zapret2-elf-inventory.txt"
            exit 1
          fi
          echo "OK: no x86_64 ELF in zapret2 APK"

          echo "=== assert: nfqws2, ip2net, mdig are aarch64 ELF (readelf -h) ==="
          : > "$ART_DIR/zapret2-elf-checks.txt"
          for bin in nfqws2 ip2net mdig; do
            f=$(find /tmp/apk-z2 -name "$bin" -type f -print -quit)
            if [ -z "$f" ]; then
              echo "FAIL: $bin not found in zapret2 APK" | tee -a "$ART_DIR/zapret2-elf-checks.txt"
              exit 1
            fi
            ft=$(file "$f")
            echo "--- $bin: $ft ---" | tee -a "$ART_DIR/zapret2-elf-checks.txt"
            case "$ft" in
              *aarch64*) echo "OK: $bin is aarch64 ELF" | tee -a "$ART_DIR/zapret2-elf-checks.txt" ;;
              *) echo "FAIL: $bin is not aarch64: $ft" | tee -a "$ART_DIR/zapret2-elf-checks.txt"; exit 1 ;;
            esac
            readelf -h "$f" 2>&1 | tee -a "$ART_DIR/zapret2-elf-checks.txt"
            echo "--- $bin: readelf -d (NEEDED) ---" | tee -a "$ART_DIR/zapret2-elf-checks.txt"
            readelf -d "$f" 2>&1 | grep -E 'NEEDED|Shared library' | tee -a "$ART_DIR/zapret2-elf-checks.txt"
          done

          echo "=== orchestra APK: must contain no ELF binaries ==="
          find /tmp/apk-orch -type f -print0 | xargs -0 file 2>/dev/null | grep -i 'ELF' > "$ART_DIR/orchestra-elf-inventory.txt" || true
          if [ -s "$ART_DIR/orchestra-elf-inventory.txt" ]; then
            echo "FAIL: orchestra APK contains ELF binaries:"
            cat "$ART_DIR/orchestra-elf-inventory.txt"
            exit 1
          fi
          echo "OK: orchestra APK has no ELF binaries"

          echo "=== on-artifact package manifests and conffiles ==="
          : > "$ART_DIR/package-manifests.txt"
          for p in zapret2 zapret2-orchestra; do
            if [ "$p" = "zapret2-orchestra" ]; then root=/tmp/apk-orch; else root=/tmp/apk-z2; fi
            echo "--- $p: /lib/apk/packages/$p.list ---" | tee -a "$ART_DIR/package-manifests.txt"
            cat "$root/lib/apk/packages/$p.list" 2>/dev/null | tee -a "$ART_DIR/package-manifests.txt"
            echo "--- $p: /lib/apk/packages/$p.conffiles ---" | tee -a "$ART_DIR/package-manifests.txt"
            cat "$root/lib/apk/packages/$p.conffiles" 2>/dev/null | tee -a "$ART_DIR/package-manifests.txt"
            echo "--- $p: /lib/apk/packages/$p.conffiles_static ---" | tee -a "$ART_DIR/package-manifests.txt"
            cat "$root/lib/apk/packages/$p.conffiles_static" 2>/dev/null | tee -a "$ART_DIR/package-manifests.txt"
          done

      - name: Build host ucode for runtime tests
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          # The zapret2-orchestra .uc sources use the ucode interpreter's
          # ECMAScript syntax (// comments, printf %J, etc.). The CI gap that
          # let Lua-style -- comments ship undetected was that the Python test
          # suite skips ucode runtime tests when ucode is not on PATH. We
          # close it by building the host ucode from the base feed (the same
          # feed the packages are built from) and putting it on PATH so the
          # runtime tests actually execute.
          #
          # ucode's OpenWrt Makefile includes host-build.mk and exports
          # HostBuild, so `make package/ucode/host/compile` produces
          # staging_dir/host/bin/ucode with FS_SUPPORT=ON. We also need the
          # fs module (staging_dir/host/lib/ucode/fs.so) which host-build
          # installs automatically.
          echo "=== feeds install ucode (host-build capable) ==="
          ./scripts/feeds install ucode
          echo "=== make package/ucode/host/compile ==="
          make package/ucode/host/compile -j$(nproc) BUILD_LOG=1
          UCODE_HOST="$(find staging_dir/host -name ucode -type f -print -quit)"
          if [ -z "$UCODE_HOST" ]; then
            echo "ERROR: host ucode binary not found after build"
            find staging_dir/host -name 'ucode*' 2>/dev/null || true
            exit 1
          fi
          echo "host ucode: $UCODE_HOST"
          "$UCODE_HOST" --version 2>&1 | head -n 3 || true
          # Verify the fs module is present.
          if ! find staging_dir/host -name 'fs.so' -path '*/ucode/*' -print -quit | grep -q .; then
            echo "ERROR: ucode-mod-fs (fs.so) not found in staging_dir/host"
            find staging_dir/host -name '*.so' -path '*ucode*' 2>/dev/null || true
            exit 1
          fi
          echo "OK: host ucode + fs module built"

      - name: ucode compile + Python runtime tests + sandbox sequence
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          SDK_ABS="$GITHUB_WORKSPACE/$SDK_DIR"
          UCODE_HOST="$(find "$SDK_ABS/staging_dir/host" -name ucode -type f -print -quit)"
          HOST_LIB="$(dirname "$(dirname "$UCODE_HOST")")/lib"
          HOST_UCODE_MODS="$(find "$SDK_ABS/staging_dir/host" -name 'fs.so' -path '*/ucode/*' -printf '%h' -quit)"
          export PATH="$(dirname "$UCODE_HOST"):$PATH"
          export LD_LIBRARY_PATH="$HOST_LIB"
          export UCODE_MOD_PATH="$HOST_UCODE_MODS"
          echo "ucode on PATH: $(which ucode)"
          ucode --version 2>&1 | head -n 2 || true

          echo "=== compile/parse all shipped ucode sources ==="
          # ucode -c compiles (parses) the source without executing it.
          # A syntax error here fails the step — this is the gate that would
          # have caught the Lua-style -- comment bug.
          for uc in \
            "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/usr/share/zapret2-orchestra/apply.uc" \
            "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/usr/share/zapret2-orchestra/generate-preload.uc" \
            "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/usr/share/rpcd/ucode/zapret2.orchestra"
          do
            echo "--- ucode -c $uc ---"
            ucode -c "$uc"
            echo "compile_rc=$?"
          done

          echo "=== Python tests with ucode on PATH (no skips) ==="
          cd "$GITHUB_WORKSPACE"
          python3 -m pip install --quiet --user --break-system-packages 2>/dev/null || true
          python3 -m unittest discover -s tests -v 2>&1 | tee /tmp/test-output.txt
          # Fail if ANY test was skipped due to ucode absence (the CI gap).
          # Other legitimate skips (router-baseline evidence) are acceptable.
          UCODE_SKIPS=$(grep -c 'ucode executable not found on PATH' /tmp/test-output.txt || true)
          if [ "$UCODE_SKIPS" -gt 0 ]; then
            echo "FAIL: $UCODE_SKIPS ucode runtime tests were skipped despite host ucode being on PATH"
            exit 1
          fi
          echo "OK: no ucode runtime tests skipped"
          # Overall result must be success.
          tail -n 3 /tmp/test-output.txt | grep -qE '^(OK|OK \(skipped=' && echo "tests OK" || {
            echo "FAIL: test suite did not pass"
            exit 1
          }

          echo "=== sandbox runtime sequence (ZAPRET2_* overrides, temp only) ==="
          # Run the real ucode manager against a fully isolated sandbox under
          # /tmp. No live /opt, /etc, or /var/lock access. All paths point
          # into the temp sandbox.
          SBX="$(mktemp -d /tmp/orch-sandbox-XXXXXX)"
          export ZAPRET2_CONFIG="$SBX/config"
          export ZAPRET2_ORCHESTRA_DIR="$SBX/orch"
          export ZAPRET2_RUNTIME_DIR="$SBX/runtime"
          export ZAPRET2_STATE_FILE="$SBX/orch/manager-state.json"
          export ZAPRET2_LOCK_DIR="$SBX/lock"
          export ZAPRET2_CANDIDATE_FILE="$SBX/candidate.tmp"
          export ZAPRET2_BACKUP_DIR="$SBX/orch/backup"
          export ZAPRET2_USER_PROFILES_DIR="$SBX/profiles"
          export ZAPRET2_BUILTIN_PROFILES_DIR="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/usr/share/zapret2-orchestra/profiles"
          export ZAPRET2_ORCHESTRA_LUA="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/opt/zapret2/lua/orchestra-extra"
          export ZAPRET2_PRELOAD_WRAPPER="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/usr/sbin/zapret2-orchestra-preload"
          export ORCHESTRA_STATE_DIR="$SBX/orch"
          export ORCHESTRA_RUNTIME_DIR="$SBX/runtime"
          export ORCHESTRA_PRELOAD_FILE="$SBX/runtime/preload.lua"
          export ORCHESTRA_WHITELIST_FILE="$SBX/runtime/whitelist.txt"
          export ORCHESTRA_MANIFEST_FILE="$SBX/runtime/manifest.json"
          mkdir -p "$SBX/orch" "$SBX/runtime" "$SBX/orch/backup"
          # Seed a minimal config with an NFQWS2_OPT assignment containing the
          # circular_quality marker (required by validate-profile).
          printf 'NFQWS2_OPT="--lua-desync --lua-init=circular_quality --filter-tls=1"\n' > "$SBX/config"
          # Seed the whitelist JSON (required by validate-profile).
          printf '{"hosts":[]}' > "$SBX/orch/whitelist.json"
          # Point the preload wrapper at the real generate-preload.uc so it
          # runs in the sandbox via ucode.
          APPLY_UC="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/usr/share/zapret2-orchestra/apply.uc"
          GEN_UC="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/usr/share/zapret2-orchestra/generate-preload.uc"
          # The wrapper execs ucode; override the generator path so the
          # sandbox preload goes to the temp runtime dir.
          run_cmd() {
            local desc="$1"; shift
            echo "--- $desc ---"
            "$@" 2>&1
            local rc=$?
            echo "rc=$rc"
            return $rc
          }
          # preload generate
          ucode "$GEN_UC" generate || { echo "FAIL: preload generate"; exit 1; }
          # preload check
          ucode "$GEN_UC" check || { echo "FAIL: preload check"; exit 1; }
          # status
          ucode "$APPLY_UC" status || { echo "FAIL: status"; exit 1; }
          # validate-config
          ucode "$APPLY_UC" validate-config || { echo "FAIL: validate-config"; exit 1; }
          # validate-profile orchestra-tls-mvp
          ucode "$APPLY_UC" validate-profile orchestra-tls-mvp || { echo "FAIL: validate-profile"; exit 1; }
          # lock-test
          ucode "$APPLY_UC" lock-test || { echo "FAIL: lock-test"; exit 1; }
          # enable
          ucode "$APPLY_UC" enable orchestra-tls-mvp || { echo "FAIL: enable"; exit 1; }
          # repeated enable (idempotent)
          ucode "$APPLY_UC" enable orchestra-tls-mvp || { echo "FAIL: idempotent enable"; exit 1; }
          # rollback
          ucode "$APPLY_UC" rollback || { echo "FAIL: rollback"; exit 1; }
          # disable
          ucode "$APPLY_UC" disable || { echo "FAIL: disable"; exit 1; }
          # idempotent disable
          ucode "$APPLY_UC" disable || { echo "FAIL: idempotent disable"; exit 1; }
          # boot-check
          ucode "$APPLY_UC" boot-check || { echo "FAIL: boot-check"; exit 1; }
          echo "=== sandbox sequence PASS ==="
          rm -rf "$SBX"

      - name: Verify create_ipset.sh executable mode in APK
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          # The router blocker: create_ipset.sh was installed as 0644
          # (INSTALL_DATA) instead of 0755, causing "Permission denied" in
          # the post-install firewall reload. The Makefile fix uses
          # INSTALL_BIN for ipset/*.sh. Verify the mode inside the built APK
          # by checking the extracted tree (populated by the inspect step).
          IPSET_SH="$(find /tmp/apk-z2 -name create_ipset.sh -type f -print -quit)"
          if [ -z "$IPSET_SH" ]; then
            echo "FAIL: create_ipset.sh not found in zapret2 APK extraction"
            find /tmp/apk-z2 -name '*.sh' 2>/dev/null || true
            exit 1
          fi
          MODE=$(stat -c '%a' "$IPSET_SH" 2>/dev/null || stat -f '%Lp' "$IPSET_SH" 2>/dev/null)
          echo "create_ipset.sh mode: $MODE (path: $IPSET_SH)"
          if [ "$MODE" != "755" ]; then
            echo "FAIL: create_ipset.sh mode is $MODE, expected 755"
            exit 1
          fi
          echo "OK: create_ipset.sh is 0755 in the APK"
          # Also verify def.sh is NOT executable (sourced, not executed).
          DEF_SH="$(find /tmp/apk-z2 -name def.sh -path '*/ipset/*' -type f -print -quit)"
          if [ -n "$DEF_SH" ]; then
            DMODE=$(stat -c '%a' "$DEF_SH" 2>/dev/null || stat -f '%Lp' "$DEF_SH" 2>/dev/null)
            echo "def.sh mode: $DMODE"
            if [ "$DMODE" = "755" ]; then
              echo "WARN: def.sh is executable but upstream marks it 0644 (sourced)"
            fi
          fi

      - name: Collect build log
        if: always()
        run: |
          set +e
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          SDK_PATH="$GITHUB_WORKSPACE/$SDK_DIR"
          # Don't use working-directory: an early failure (host deps, SDK
          # download) can leave SDK_DIR absent, and a cd would mask the real
          # error with "No such file or directory". Never fail this step:
          # missing logs must not abort log collection or hide the upstream
          # error.
          if [ ! -d "$SDK_PATH" ]; then
            echo "No OpenWrt build logs found (SDK_DIR $SDK_DIR not present)."
            exit 0
          fi
          HAVE_LOGS=0
          if [ -d "$SDK_PATH/logs" ]; then
            tar -cJf "$GITHUB_WORKSPACE/artifacts/build-logs.tar.xz" -C "$SDK_PATH" logs/
            HAVE_LOGS=1
          fi
          # Capture packageinfo and a bin/packages listing for diagnosis
          # when a build failed before producing logs.
          if [ -f "$SDK_PATH/tmp/.packageinfo" ]; then
            cp "$SDK_PATH/tmp/.packageinfo" "$GITHUB_WORKSPACE/artifacts/packageinfo.txt"
          fi
          if [ -d "$SDK_PATH/bin/packages" ]; then
            find "$SDK_PATH/bin/packages" -type f > "$GITHUB_WORKSPACE/artifacts/bin-packages-listing.txt" 2>/dev/null
          fi
          if [ "$HAVE_LOGS" = 0 ]; then
            echo "No OpenWrt build logs found"
          fi
          exit 0

      - name: Copy APKs to artifacts
        if: always() && steps.locate-apk.outcome == 'success'
        run: |
          mkdir -p artifacts
          cp "$GITHUB_WORKSPACE/$SDK_DIR/${{ steps.locate-apk.outputs.orch_apk_path }}" "artifacts/${{ steps.locate-apk.outputs.orch_apk_name }}" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/$SDK_DIR/${{ steps.locate-apk.outputs.z2_apk_path }}" "artifacts/${{ steps.locate-apk.outputs.z2_apk_name }}" 2>/dev/null || true

      - name: Upload APKs
        if: always() && steps.locate-apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: zapret2-apks
          path: artifacts/*.apk
          if-no-files-found: warn

      - name: Upload metadata and file lists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zapret2-metadata
          path: |
            artifacts/orchestra-files.txt
            artifacts/zapret2-files.txt
            artifacts/nfqws2-file-type.txt
            artifacts/nfqws2-readelf.txt
            artifacts/apk-sha256.txt
            artifacts/zapret2-elf-inventory.txt
            artifacts/zapret2-elf-checks.txt
            artifacts/orchestra-elf-inventory.txt
            artifacts/package-manifests.txt
            artifacts/packageinfo.txt
            artifacts/bin-packages-listing.txt
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zapret2-orchestra-build-logs
          path: artifacts/build-logs.tar.xz
          if-no-files-found: warn
