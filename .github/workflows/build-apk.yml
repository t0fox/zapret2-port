name: Build zapret2-orchestra APK

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'fast = validate only (ucode + tests + sandbox, no APK build); full = validate + SDK APK build + audits + artifacts'
        required: false
        default: 'fast'
        type: choice
        options:
          - fast
          - full

env:
  SDK_URL: ${{ inputs.sdk_url || 'https://downloads.openwrt.org/releases/25.12.5/targets/mediatek/filogic/openwrt-sdk-25.12.5-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst' }}
  SDK_SHA256: ${{ inputs.sdk_sha256 || 'ff4a38a397caa2cfe1c39e18f84ddede14878221b3593c3f2c4cfe24e3ec4c25' }}
  SDK_DIR: openwrt-sdk-25.12.5-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64
  # Pin the host ucode to the same commit the OpenWrt 25.12.5 base feed ships
  # (router version ucode-2026.01.16~85922056-r1). Never use master: a drift
  # could change syntax semantics between CI and the router.
  UCODE_PIN: 85922056ef7abeace3cca3ab28bc1ac2d88e31b1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # validate: runs in BOTH fast and full modes. No SDK, no APK build.
  # Builds a host ucode from the pinned commit, compiles every shipped .uc
  # source, runs the Python test suite (ucode runtime tests must NOT skip),
  # and exercises the real runtime manager in an isolated /tmp sandbox.
  # Target duration: 1–2 minutes.
  # ─────────────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout zapret2-port
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install host dependencies
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y cmake libjson-c-dev busybox
          # Diagnostics dir for the validate artifact (uploaded with if: always()).
          mkdir -p "$GITHUB_WORKSPACE/diagnostics"
          # Confirm BusyBox ash is available; the shipped shell CLIs must parse
          # under POSIX/BusyBox ash the same way they parse under bash (the
          # router runs BusyBox ash, not bash).
          command -v busybox
          busybox ash -c 'echo ash_ok'

      - name: Build and install host ucode (pinned commit)
        run: |
          set -eu
          # Fetch exactly the pinned commit (shallow), not master.
          git init /tmp/ucode-src
          cd /tmp/ucode-src
          git remote add origin https://github.com/jow-/ucode.git
          git fetch --depth 1 origin "$UCODE_PIN"
          git checkout FETCH_HEAD
          echo "checked out: $(git rev-parse HEAD)"
          # FS_SUPPORT=ON is required — apply.uc imports opendir/readfile/etc.
          # Disable OpenWrt-specific modules (ubus/uci/uloop/nl80211/rtnl) that
          # need libraries not present on the runner.
          cmake \
            -DUBUS_SUPPORT=OFF \
            -DUCI_SUPPORT=OFF \
            -DULOOP_SUPPORT=OFF \
            -DNL80211_SUPPORT=OFF \
            -DRESOLV_SUPPORT=OFF \
            -DRTNL_SUPPORT=OFF \
            -DSTRUCT_SUPPORT=OFF \
            -DFS_SUPPORT=ON \
            -DMATH_SUPPORT=ON \
            -DCMAKE_BUILD_TYPE=Release \
            .
          make -j"$(nproc)"
          sudo make install
          # Register /usr/local/lib/libucode.so.0 with the dynamic linker so
          # the installed ucode binary can start (cmake sets empty RPATH).
          sudo ldconfig
          echo "ucode: $(command -v ucode)"
          # ucode has no --version flag (its getopt optspec has no v/V, so
          # `--version`/`-v` print "invalid option"). The pinned commit SHA is
          # the authoritative build identity; capture `ucode -h` for the
          # diagnostic artifact.
          echo "ucode pinned build: $UCODE_PIN (checked out: $(git rev-parse HEAD))"
          ucode -h > "$GITHUB_WORKSPACE/diagnostics/ucode-help.txt" 2>&1 || true

      - name: Smoke-test host ucode (fs import + comment style)
        run: |
          set -eu
          # Prove the fs module resolves through the default search path
          # (/usr/local/lib/ucode/*.so).
          printf 'import { stat } from "fs";\nprint("fs_ok");\n' | ucode - 2>&1 | grep -q fs_ok || {
            echo "FAIL: ucode fs import smoke test"
            exit 1
          }
          # // comments must work (ECMAScript-oriented ucode).
          printf '// cmt\nprint("cmt_ok");\n' | ucode - 2>&1 | grep -q cmt_ok || {
            echo "FAIL: ucode // comment test"
            exit 1
          }
          echo "OK: host ucode smoke-tested"

      - name: BusyBox ash syntax gate for shipped shell CLIs
        run: |
          set -eu
          # The router runs BusyBox ash, not bash. The two shipped shell CLIs
          # must parse cleanly under `busybox ash -n` (syntax-only, no exec):
          # this catches bashisms (e.g. $'...' dollar-quoting) that bash -n
          # would accept but ash would choke on at runtime. `sh -n` on the
          # runner is dash, which is closer to ash but not identical; busybox
          # ash is the exact target shell.
          ORCH="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files"
          SCRIPTS=(
            "$ORCH/usr/sbin/zapret2-orchestra-profile"
            "$ORCH/usr/sbin/zapret2-orchestra-blockcheck"
          )
          for s in "${SCRIPTS[@]}"; do
            name="$(basename "$s")"
            echo "--- busybox ash -n $name ---"
            if busybox ash -n "$s"; then
              echo "OK: $name parses under busybox ash"
            else
              rc=$?
              echo "FAIL: $name does not parse under busybox ash (rc=$rc)"
              exit "$rc"
            fi
            # Guard: no $'\n' / $'...' dollar-quoting bashism in the script.
            if grep -Eq "\\$'" "$s"; then
              echo "FAIL: $name contains a \$'...' dollar-quoting bashism (BusyBox ash unsupported)"
              grep -nE "\\$'" "$s" || true
              exit 1
            fi
          done
          echo "=== shipped shell CLIs parse under busybox ash ==="

      - name: Compile/parse all shipped ucode sources (incl. rpcd backend)
        run: |
          set -eu
          DIAG="$GITHUB_WORKSPACE/diagnostics"
          CI_MODDIR="$GITHUB_WORKSPACE/tests/ci"
          ORCH="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files"
          mkdir -p "$DIAG"
          # Environment paths for the diagnostic artifact (no secrets).
          {
            echo "ucode_pin=$UCODE_PIN"
            echo "ucode_bin=$(command -v ucode)"
            echo "github_workspace=$GITHUB_WORKSPACE"
            echo "ci_moddir=$CI_MODDIR"
            echo "runner_os=${RUNNER_OS:-}"
          } > "$DIAG/env.txt"
          # ucode CLI (verified from main.c optspec "he:p:tg:ST::RD:F:U:l:L:c::o:s"):
          #   -L <dir>   prepend <dir>/*.so and <dir>/*.uc to the module search path
          #   -c         compile to bytecode (parse) without executing; still resolves imports
          #   -o <path>  bytecode output (default ./uc.out) -> /dev/null, no binary in the tree
          # The rpcd backend imports 'uci' (OpenWrt-native, absent on the runner).
          # tests/ci/uci.uc is a CI-only stub exporting cursor() so that import
          # resolves via -L tests/ci. The rpcd backend is NOT excluded from this
          # syntax gate -- all three sources are -c compiled for real.
          # --- 1) prove the uci stub resolves + cursor() is callable (separate command) ---
          printf 'import { cursor } from "uci";\ncursor();\nprint("uci_stub_ok");\n' > "$DIAG/uci-stub-test.uc"
          set +e
          ucode -L "$CI_MODDIR" "$DIAG/uci-stub-test.uc" > "$DIAG/uci-stub-test.out" 2>"$DIAG/uci-stub-test.err"
          STUB_RC=$?
          set -e
          echo "--- uci stub resolution test (rc=$STUB_RC) ---"
          cat "$DIAG/uci-stub-test.out"
          if [ "$STUB_RC" -ne 0 ] || ! grep -q 'uci_stub_ok' "$DIAG/uci-stub-test.out"; then
            echo "FAIL: uci stub did not resolve (rc=$STUB_RC)"
            echo "--- stderr ---"
            cat "$DIAG/uci-stub-test.err"
            exit 1
          fi
          echo "OK: uci stub resolves, cursor() callable"
          # --- 2) -c compile every shipped source, capturing per-file stdout/stderr/rc ---
          : > "$DIAG/compile-summary.txt"
          SRC_ARR=(
            "$ORCH/usr/share/zapret2-orchestra/apply.uc"
            "$ORCH/usr/share/zapret2-orchestra/generate-preload.uc"
            "$ORCH/usr/share/rpcd/ucode/zapret2.orchestra"
          )
          for uc in "${SRC_ARR[@]}"; do
            name="$(basename "$uc")"
            echo "--- ucode -c $name ---" | tee -a "$DIAG/compile-summary.txt"
            set +e
            ucode -L "$CI_MODDIR" -c -o /dev/null "$uc" >"$DIAG/${name}.compile.stdout" 2>"$DIAG/${name}.compile.stderr"
            RC=$?
            set -e
            echo "rc=$RC file=$name" | tee -a "$DIAG/compile-summary.txt"
            echo "command=ucode -L $CI_MODDIR -c -o /dev/null $uc" | tee -a "$DIAG/compile-summary.txt"
            if [ -s "$DIAG/${name}.compile.stderr" ]; then
              echo "--- stderr ---" | tee -a "$DIAG/compile-summary.txt"
              cat "$DIAG/${name}.compile.stderr" | tee -a "$DIAG/compile-summary.txt"
            fi
            if [ "$RC" -ne 0 ]; then
              echo "FAIL: $name compile failed (rc=$RC) - full stderr above" | tee -a "$DIAG/compile-summary.txt"
              exit 1
            fi
            echo "OK: $name compiled" | tee -a "$DIAG/compile-summary.txt"
          done
          echo "=== all shipped ucode sources compile ==="

      - name: Python tests (ucode runtime tests must NOT skip)
        run: |
          set -uo pipefail
          cd "$GITHUB_WORKSPACE"
          DIAG="$GITHUB_WORKSPACE/diagnostics"
          mkdir -p "$DIAG"
          # pipefail + ${PIPESTATUS[0]} = unittest's real exit code, preserved
          # through tee. Replaces the fragile `tail -n 3 | grep '^OK'` heuristic
          # that broke if unittest's summary line format ever changed.
          python3 -m unittest discover -s tests -v 2>&1 | tee "$DIAG/python-tests.log"
          PY_RC=${PIPESTATUS[0]}
          echo "python_unittest_rc=$PY_RC" | tee -a "$DIAG/python-tests.log"
          # Surface every skip line + reason for the report (legitimate skips
          # are not hidden, just enumerated).
          echo "--- skip lines ---" | tee -a "$DIAG/python-tests.log"
          grep -nE 'skipped' "$DIAG/python-tests.log" | tee -a "$DIAG/python-tests.log" || true
          # The CI gap: ucode runtime tests must not skip due to ucode absence.
          UCODE_SKIPS=$(grep -c 'ucode executable not found on PATH' "$DIAG/python-tests.log" || true)
          if [ "$UCODE_SKIPS" -gt 0 ]; then
            echo "FAIL: $UCODE_SKIPS ucode runtime tests skipped despite ucode on PATH"
            exit 1
          fi
          echo "OK: no ucode runtime tests skipped"
          if [ "$PY_RC" -ne 0 ]; then
            echo "FAIL: unittest exit code $PY_RC"
            exit 1
          fi
          echo "OK: python test suite passed (rc=$PY_RC)"

      - name: Sandbox runtime sequence (isolated /tmp, no live paths)
        run: |
          set -euo pipefail
          export LD_LIBRARY_PATH="/usr/local/lib:${LD_LIBRARY_PATH:-}"
          DIAG="$GITHUB_WORKSPACE/diagnostics"
          mkdir -p "$DIAG"
          SBX="$(mktemp -d /tmp/orch-sandbox-XXXXXX)"
          SBX_LOG="$DIAG/sandbox-sequence.log"
          : > "$SBX_LOG"
          # Cleanup on exit OR error: always remove the temp sandbox. The trap
          # never touches /opt, /etc, /var/lock, nftables, or runner services.
          trap 'rm -rf "$SBX"' EXIT
          APPLY_UC="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/usr/share/zapret2-orchestra/apply.uc"
          GEN_UC="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files/usr/share/zapret2-orchestra/generate-preload.uc"
          REPO_FILES="$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/files"
          # All ZAPRET2_* paths point into the sandbox — never live /opt, /etc,
          # or /var/lock. The builtin profile and orchestra-extra lua are read
          # from the repo source tree (read-only).
          export ZAPRET2_CONFIG="$SBX/config"
          export ZAPRET2_ORCHESTRA_DIR="$SBX/orch"
          export ZAPRET2_RUNTIME_DIR="$SBX/runtime"
          export ZAPRET2_STATE_FILE="$SBX/orch/manager-state.json"
          export ZAPRET2_LOCK_DIR="$SBX/lock"
          export ZAPRET2_CANDIDATE_FILE="$SBX/candidate.tmp"
          export ZAPRET2_BACKUP_DIR="$SBX/orch/backup"
          export ZAPRET2_USER_PROFILES_DIR="$SBX/profiles"
          export ZAPRET2_BUILTIN_PROFILES_DIR="$REPO_FILES/usr/share/zapret2-orchestra/profiles"
          export ZAPRET2_ORCHESTRA_LUA="$REPO_FILES/opt/zapret2/lua/orchestra-extra"
          # generate-preload.uc env overrides (sandbox runtime files).
          export ORCHESTRA_STATE_DIR="$SBX/orch"
          export ORCHESTRA_RUNTIME_DIR="$SBX/runtime"
          export ORCHESTRA_PRELOAD_FILE="$SBX/runtime/preload.lua"
          export ORCHESTRA_WHITELIST_FILE="$SBX/runtime/whitelist.txt"
          export ORCHESTRA_MANIFEST_FILE="$SBX/runtime/manifest.json"
          mkdir -p "$SBX/orch" "$SBX/runtime" "$SBX/orch/backup" "$SBX/profiles"
          # Seed a minimal config with an NFQWS2_OPT assignment containing the
          # circular_quality marker (required by validate-profile).
          printf 'NFQWS2_OPT="--lua-desync --lua-init=circular_quality --filter-tls=1"\n' > "$SBX/config"
          # Copy the real persistent JSON seeds (blocked/learned/manual-locks/
          # whitelist) so generate-preload.uc and validate-profile find them.
          cp "$REPO_FILES/etc/zapret2-orchestra/"*.json "$SBX/orch/"
          # CI-only preload wrapper: exec ucode with the repo's generate-preload.uc.
          # The shipped wrapper hardcodes /usr/share/.../generate-preload.uc which
          # doesn't exist on the runner, so we override it here. apply.uc calls
          # this via popen([...], 'r').
          cat > "$SBX/preload-wrapper.sh" <<WRAPPER
          #!/bin/sh
          exec ucode "$GEN_UC" "\$@"
          WRAPPER
          chmod +x "$SBX/preload-wrapper.sh"
          export ZAPRET2_PRELOAD_WRAPPER="$SBX/preload-wrapper.sh"
          # run_cmd: print rc + stderr per command, accumulate failures, never
          # abort early so every step's outcome is visible in the log.
          OVERALL=0
          run_cmd() {
            local desc="$1"; shift
            echo "--- $desc ---" | tee -a "$SBX_LOG"
            set +e
            "$@" 2>&1 | tee -a "$SBX_LOG"
            local rc=${PIPESTATUS[0]}
            set -e
            echo "rc=$rc" | tee -a "$SBX_LOG"
            if [ "$rc" -ne 0 ]; then OVERALL=1; fi
          }
          run_cmd "1 preload generate"            ucode "$GEN_UC" generate
          run_cmd "2 preload check"               ucode "$GEN_UC" check
          run_cmd "3 status"                      ucode "$APPLY_UC" status
          run_cmd "4 validate-config"             ucode "$APPLY_UC" validate-config
          run_cmd "5 validate-profile"            ucode "$APPLY_UC" validate-profile orchestra-tls-mvp
          run_cmd "6 lock-test"                   ucode "$APPLY_UC" lock-test
          run_cmd "7 enable"                      ucode "$APPLY_UC" enable orchestra-tls-mvp
          run_cmd "8 enable (idempotent)"         ucode "$APPLY_UC" enable orchestra-tls-mvp
          run_cmd "9 rollback"                    ucode "$APPLY_UC" rollback
          run_cmd "10 disable"                    ucode "$APPLY_UC" disable
          run_cmd "11 disable (idempotent)"       ucode "$APPLY_UC" disable
          run_cmd "12 boot-check"                 ucode "$APPLY_UC" boot-check
          echo "=== sandbox overall rc=$OVERALL ===" | tee -a "$SBX_LOG"
          if [ "$OVERALL" -ne 0 ]; then
            echo "FAIL: one or more sandbox steps failed (see $SBX_LOG)" | tee -a "$SBX_LOG"
            exit 1
          fi
          echo "=== sandbox sequence PASS ===" | tee -a "$SBX_LOG"

      - name: Upload validate diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zapret2-validate-diagnostics
          path: |
            diagnostics/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────
  # build-apk: runs only in full mode, after validate passes.
  # Builds both APKs from the OpenWrt SDK with ccache, extracts and audits
  # them, verifies create_ipset.sh is 0755, and uploads artifacts.
  # ─────────────────────────────────────────────────────────────────────
  build-apk:
    needs: validate
    if: github.event.inputs.mode == 'full'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout zapret2-port
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install host dependencies
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y zstd binutils file

      - name: Restore SDK archive cache
        id: sdk-archive-cache
        uses: actions/cache@v5
        with:
          key: sdk-archive-${{ env.SDK_SHA256 }}
          path: ${{ env.SDK_DIR }}.tar.zst

      - name: Download and verify SDK
        run: |
          set -eu
          ARCHIVE="$(basename "$SDK_URL")"
          if [ -f "$ARCHIVE" ]; then
            echo "SDK archive restored from cache: $ARCHIVE"
          else
            echo "Downloading SDK: $SDK_URL"
            curl -fSL --retry 5 --retry-delay 5 -o "$ARCHIVE" "$SDK_URL"
          fi
          echo "Verifying SHA256..."
          ACTUAL=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          echo "Expected: $SDK_SHA256"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$SDK_SHA256" ]; then
            echo "ERROR: SHA256 mismatch — removing cached archive and re-downloading"
            rm -f "$ARCHIVE"
            curl -fSL --retry 5 --retry-delay 5 -o "$ARCHIVE" "$SDK_URL"
            ACTUAL=$(sha256sum "$ARCHIVE" | awk '{print $1}')
            [ "$ACTUAL" = "$SDK_SHA256" ] || { echo "ERROR: SHA256 mismatch on re-download"; exit 1; }
          fi
          echo "Extracting SDK..."
          tar --zstd -xf "$ARCHIVE"
          echo "SDK ready at $SDK_DIR"

      - name: Restore SDK dl/ cache
        uses: actions/cache@v5
        with:
          key: sdk-dl-${{ env.SDK_SHA256 }}
          path: ${{ env.SDK_DIR }}/dl/

      - name: Verify SDK layout
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          test -d include || { echo "ERROR: SDK include/ not found"; exit 1; }
          test -f include/package.mk || { echo "ERROR: include/package.mk not found"; exit 1; }
          test -d staging_dir/host/bin || { echo "ERROR: staging_dir/host/bin not found"; exit 1; }
          test -x staging_dir/host/bin/apk || {
            echo "ERROR: SDK host apk not found or not executable"
            ls -la staging_dir/host/bin/ 2>&1 | head -40 || true
            exit 1
          }
          echo "=== SDK host apk ==="
          staging_dir/host/bin/apk --version
          echo "SDK layout verified"

      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache@v5
        with:
          # Composite key: runner OS, SDK SHA, OpenWrt release/target, and a
          # hash of the package sources. A source change (e.g. a .uc comment
          # fix) changes the hash → new key, but the restore-key prefix (by
          # SDK SHA + target) matches the previous cache, so ccache contents
          # are reused and only the changed files are recompiled.
          key: ${{ runner.os }}-ccache-sdk${{ env.SDK_SHA256 }}-owrt25.12.5-mediatek-filogic-${{ hashFiles('openwrt/zapret2/**', 'zapret2-core/**') }}
          restore-keys: |
            ${{ runner.os }}-ccache-sdk${{ env.SDK_SHA256 }}-owrt25.12.5-mediatek-filogic-
          path: ${{ env.SDK_DIR }}/.ccache

      - name: Prepare package tree
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          cp -r "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra" package/zapret2-orchestra
          cp -r "$GITHUB_WORKSPACE/openwrt/zapret2" package/zapret2
          echo "Package tree prepared:"
          find package -maxdepth 2 -name Makefile | sort

      - name: Init feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          if [ -f feeds.conf.default ]; then
            cp feeds.conf.default feeds.conf
          else
            echo "ERROR: feeds.conf.default not found"
            exit 1
          fi
          sed -i \
            -e 's|https://git.openwrt.org/feed/|https://github.com/openwrt/|' \
            -e 's|https://git.openwrt.org/project/|https://github.com/openwrt/|' \
            -e 's|https://git.openwrt.org/openwrt/|https://github.com/openwrt/|' \
            feeds.conf
          echo "=== feeds.conf ==="
          cat feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Init config (ccache enabled)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          make defconfig
          # Enable ccache for cross-compilation. The ccache dir defaults to
          # $(TOPDIR)/.ccache which is cached by the actions/cache step above.
          echo 'CONFIG_CCACHE=y' >> .config
          make defconfig
          echo "=== .config excerpt (ccache + zapret) ==="
          grep -iE 'CONFIG_CCACHE|zapret' .config || echo "(no matches)"

      - name: Build both packages (parallel, merged make)
        id: build
        continue-on-error: true
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          echo "Building zapret2 + zapret2-orchestra with -j$(nproc)..."
          make package/zapret2/compile package/zapret2-orchestra/compile -j"$(nproc)" BUILD_LOG=1
          echo "both packages built successfully"

      - name: Build both packages (retry single-threaded with verbose)
        if: steps.build.outcome == 'failure'
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          echo "Retrying both packages with -j1 V=sc..."
          make package/zapret2/compile package/zapret2-orchestra/compile -j1 V=sc BUILD_LOG=1
          echo "both packages single-threaded build succeeded"

      - name: Save ccache immediately after successful compilation
        if: steps.build.outcome == 'success' || (steps.build.outcome == 'failure' && success())
        uses: actions/cache/save@v5
        with:
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}
          path: ${{ env.SDK_DIR }}/.ccache

      - name: Locate built APKs
        id: locate-apk
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          ORCH_APK=$(find bin/packages -name 'zapret2-orchestra-*.apk' -type f -print -quit)
          if [ -z "$ORCH_APK" ]; then
            echo "ERROR: no zapret2-orchestra APK found in bin/packages/"
            find bin/packages -name '*orchestra*' -type f -print || true
            exit 1
          fi
          Z2_APK=$(find bin/packages -name 'zapret2-*.apk' ! -name 'zapret2-orchestra-*' -type f -print -quit)
          if [ -z "$Z2_APK" ]; then
            echo "ERROR: no zapret2 APK found in bin/packages/"
            find bin/packages -name 'zapret2*' -type f -print || true
            exit 1
          fi
          echo "Orchestra APK: $ORCH_APK"
          echo "Zapret2 APK: $Z2_APK"
          echo "orch_apk_path=$ORCH_APK" >> "$GITHUB_OUTPUT"
          echo "orch_apk_name=$(basename "$ORCH_APK")" >> "$GITHUB_OUTPUT"
          echo "z2_apk_path=$Z2_APK" >> "$GITHUB_OUTPUT"
          echo "z2_apk_name=$(basename "$Z2_APK")" >> "$GITHUB_OUTPUT"

      - name: Inspect and verify APKs
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          SDK_ABS="$GITHUB_WORKSPACE/$SDK_DIR"
          APK_BIN="$SDK_ABS/staging_dir/host/bin/apk"
          ORCH_APK="$SDK_ABS/${{ steps.locate-apk.outputs.orch_apk_path }}"
          Z2_APK="$SDK_ABS/${{ steps.locate-apk.outputs.z2_apk_path }}"
          ART_DIR="$GITHUB_WORKSPACE/artifacts"

          echo "APK_BIN: $APK_BIN"
          test -x "$APK_BIN" || { echo "ERROR: $APK_BIN not executable"; exit 1; }
          "$APK_BIN" --version

          mkdir -p /tmp/apk-orch /tmp/apk-z2 "$ART_DIR"

          echo "=== Orchestra APK ==="
          ls -lh "$ORCH_APK"
          file "$ORCH_APK"

          echo "=== Zapret2 APK ==="
          ls -lh "$Z2_APK"
          file "$Z2_APK"

          echo "=== Extract APKs (apk --allow-untrusted extract --destination) ==="
          if "$APK_BIN" --allow-untrusted extract --destination /tmp/apk-orch "$ORCH_APK"; then
            echo "OK: orchestra extracted"
          else
            echo "FAIL: orchestra apk extract failed (exit $?)"
            exit 1
          fi
          if "$APK_BIN" --allow-untrusted extract --destination /tmp/apk-z2 "$Z2_APK"; then
            echo "OK: zapret2 extracted"
          else
            echo "FAIL: zapret2 apk extract failed (exit $?)"
            exit 1
          fi

          echo "=== Extracted orchestra file listing ==="
          find /tmp/apk-orch -type f 2>/dev/null | sort > "$ART_DIR/orchestra-files.txt"
          cat "$ART_DIR/orchestra-files.txt"

          echo "=== Extracted zapret2 file listing ==="
          find /tmp/apk-z2 -type f 2>/dev/null | sort > "$ART_DIR/zapret2-files.txt"
          cat "$ART_DIR/zapret2-files.txt"

          echo "=== Contract: zapret2 APK contains nfqws2 ==="
          NFQWS2=""
          if find /tmp/apk-z2 -name 'nfqws2' -type f 2>/dev/null | grep -q .; then
            NFQWS2=$(find /tmp/apk-z2 -name 'nfqws2' -type f -print -quit)
            echo "OK: nfqws2 extracted at $NFQWS2"
          elif grep -q '/opt/zapret2/nfq2/nfqws2' "$ART_DIR/zapret2-files.txt" 2>/dev/null; then
            echo "OK: nfqws2 listed in manifest"
            NFQWS2="manifest-only"
          else
            echo "FAIL: nfqws2 not found in zapret2 APK"
            cat "$ART_DIR/zapret2-files.txt" 2>/dev/null || true
            exit 1
          fi

          echo "=== Contract: nfqws2 is AArch64 ELF ==="
          if [ -n "$NFQWS2" ] && [ "$NFQWS2" != "manifest-only" ] && [ -f "$NFQWS2" ]; then
            file "$NFQWS2" > "$ART_DIR/nfqws2-file-type.txt" 2>&1
            cat "$ART_DIR/nfqws2-file-type.txt"
            if file "$NFQWS2" | grep -q 'ELF.*aarch64'; then
              echo "OK: nfqws2 is AArch64 ELF"
            else
              echo "FAIL: nfqws2 is not AArch64 ELF"
              exit 1
            fi
            echo "--- readelf -d ---"
            readelf -d "$NFQWS2" 2>/dev/null || true
            readelf -d "$NFQWS2" > "$ART_DIR/nfqws2-readelf.txt" 2>&1 || true
          else
            echo "WARN: nfqws2 not extracted, skipping ELF check"
          fi

          echo "=== Contract: orchestra APK has no nfqws2 ==="
          if find /tmp/apk-orch -name 'nfqws2' -type f 2>/dev/null | grep -q .; then
            echo "FAIL: nfqws2 found in orchestra APK"
            exit 1
          elif grep -q '/opt/zapret2/nfq2/nfqws2' "$ART_DIR/orchestra-files.txt" 2>/dev/null; then
            echo "FAIL: nfqws2 listed in orchestra manifest"
            exit 1
          else
            echo "OK: no nfqws2 in orchestra APK"
          fi

          echo "=== Contract: orchestra depends on zapret2 (Makefile DEPENDS) ==="
          if grep -q 'zapret2' "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/Makefile"; then
            echo "OK: orchestra Makefile references zapret2 in DEPENDS"
          else
            echo "FAIL: orchestra Makefile does not reference zapret2"
            cat "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/Makefile"
            exit 1
          fi

          echo "=== Contract: no ../../zapret2-core in any Makefile ==="
          if grep -r '\.\./\.\./zapret2-core' package/ 2>/dev/null; then
            echo "FAIL: ../../zapret2-core reference found"
            exit 1
          else
            echo "OK: no ../../zapret2-core references"
          fi

          echo "=== Contract: orchestra conffiles ==="
          for f in /etc/zapret2-orchestra/blocked.json /etc/zapret2-orchestra/learned.json /etc/zapret2-orchestra/manual-locks.json /etc/zapret2-orchestra/whitelist.json; do
            if grep -F -q "$f" "$ART_DIR/orchestra-files.txt" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f not found in orchestra APK"
            fi
          done

          echo "=== Contract: orchestra required files ==="
          for f in \
            /usr/share/rpcd/ucode/zapret2.orchestra \
            /usr/share/rpcd/acl.d/zapret2-orchestra.json \
            /usr/share/zapret2-orchestra/generate-preload.uc \
            /usr/sbin/zapret2-orchestra-preload \
            /etc/init.d/zapret2-orchestra \
            /opt/zapret2/lua/orchestra-extra/init.lua
          do
            if grep -F -q "$f" "$ART_DIR/orchestra-files.txt" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f not found in orchestra APK"
            fi
          done

          echo "=== Contract: zapret2 required files ==="
          for f in \
            /opt/zapret2/nfq2/nfqws2 \
            /opt/zapret2/ip2net/ip2net \
            /opt/zapret2/mdig/mdig \
            /opt/zapret2/lua/zapret-lib.lua \
            /opt/zapret2/lua/zapret-antidpi.lua \
            /opt/zapret2/lua/zapret-auto.lua \
            /etc/init.d/zapret2
          do
            if grep -F -q "$f" "$ART_DIR/zapret2-files.txt" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f not found in zapret2 APK"
            fi
          done

          echo "=== Contract: no .ipk files ==="
          if find bin/packages -name '*.ipk' -type f 2>/dev/null | grep -q .; then
            echo "FAIL: .ipk files found"
            find bin/packages -name '*.ipk' -type f
            exit 1
          else
            echo "OK: no .ipk files"
          fi

          echo "=== Contract: zapret2 architecture is target (not PKGARCH:=all) ==="
          if grep -q '^\s*PKGARCH\s*:=\s*all\b' "$GITHUB_WORKSPACE/openwrt/zapret2/Makefile" 2>/dev/null; then
            echo "FAIL: zapret2 Makefile declares PKGARCH:=all"
            exit 1
          else
            echo "OK: zapret2 is target-arch (no PKGARCH:=all)"
          fi

          echo "=== Contract: orchestra architecture is PKGARCH:=all ==="
          if grep -q '^\s*PKGARCH\s*:=\s*all\b' "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/Makefile" 2>/dev/null; then
            echo "OK: orchestra architecture is all"
          else
            echo "WARN: orchestra PKGARCH:=all not found or formatted differently"
          fi

          echo "=== All contract checks complete ==="

      - name: Stage 2 APK audit
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          ART_DIR="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$ART_DIR"

          echo "=== SHA256 of built APKs ==="
          {
            sha256sum "$GITHUB_WORKSPACE/$SDK_DIR/${{ steps.locate-apk.outputs.orch_apk_path }}"
            sha256sum "$GITHUB_WORKSPACE/$SDK_DIR/${{ steps.locate-apk.outputs.z2_apk_path }}"
          } | tee "$ART_DIR/apk-sha256.txt"

          echo "=== ELF inventory: every ELF file in the zapret2 APK ==="
          find /tmp/apk-z2 -type f -print0 | xargs -0 file 2>/dev/null | grep -i 'ELF' > "$ART_DIR/zapret2-elf-inventory.txt" || true
          cat "$ART_DIR/zapret2-elf-inventory.txt"
          if grep -i 'x86-64' "$ART_DIR/zapret2-elf-inventory.txt" >/dev/null 2>&1; then
            echo "FAIL: x86_64 ELF found in zapret2 APK"
            grep -i 'x86-64' "$ART_DIR/zapret2-elf-inventory.txt"
            exit 1
          fi
          echo "OK: no x86_64 ELF in zapret2 APK"

          echo "=== assert: nfqws2, ip2net, mdig are aarch64 ELF (readelf -h) ==="
          : > "$ART_DIR/zapret2-elf-checks.txt"
          for bin in nfqws2 ip2net mdig; do
            f=$(find /tmp/apk-z2 -name "$bin" -type f -print -quit)
            if [ -z "$f" ]; then
              echo "FAIL: $bin not found in zapret2 APK" | tee -a "$ART_DIR/zapret2-elf-checks.txt"
              exit 1
            fi
            ft=$(file "$f")
            echo "--- $bin: $ft ---" | tee -a "$ART_DIR/zapret2-elf-checks.txt"
            case "$ft" in
              *aarch64*) echo "OK: $bin is aarch64 ELF" | tee -a "$ART_DIR/zapret2-elf-checks.txt" ;;
              *) echo "FAIL: $bin is not aarch64: $ft" | tee -a "$ART_DIR/zapret2-elf-checks.txt"; exit 1 ;;
            esac
            readelf -h "$f" 2>&1 | tee -a "$ART_DIR/zapret2-elf-checks.txt"
            echo "--- $bin: readelf -d (NEEDED) ---" | tee -a "$ART_DIR/zapret2-elf-checks.txt"
            readelf -d "$f" 2>&1 | grep -E 'NEEDED|Shared library' | tee -a "$ART_DIR/zapret2-elf-checks.txt"
          done

          echo "=== orchestra APK: must contain no ELF binaries ==="
          find /tmp/apk-orch -type f -print0 | xargs -0 file 2>/dev/null | grep -i 'ELF' > "$ART_DIR/orchestra-elf-inventory.txt" || true
          if [ -s "$ART_DIR/orchestra-elf-inventory.txt" ]; then
            echo "FAIL: orchestra APK contains ELF binaries:"
            cat "$ART_DIR/orchestra-elf-inventory.txt"
            exit 1
          fi
          echo "OK: orchestra APK has no ELF binaries"

          echo "=== on-artifact package manifests and conffiles ==="
          : > "$ART_DIR/package-manifests.txt"
          for p in zapret2 zapret2-orchestra; do
            if [ "$p" = "zapret2-orchestra" ]; then root=/tmp/apk-orch; else root=/tmp/apk-z2; fi
            echo "--- $p: /lib/apk/packages/$p.list ---" | tee -a "$ART_DIR/package-manifests.txt"
            cat "$root/lib/apk/packages/$p.list" 2>/dev/null | tee -a "$ART_DIR/package-manifests.txt"
            echo "--- $p: /lib/apk/packages/$p.conffiles ---" | tee -a "$ART_DIR/package-manifests.txt"
            cat "$root/lib/apk/packages/$p.conffiles" 2>/dev/null | tee -a "$ART_DIR/package-manifests.txt"
            echo "--- $p: /lib/apk/packages/$p.conffiles_static ---" | tee -a "$ART_DIR/package-manifests.txt"
            cat "$root/lib/apk/packages/$p.conffiles_static" 2>/dev/null | tee -a "$ART_DIR/package-manifests.txt"
          done

      - name: Stage 3 APK contract audit (modes, profile set, releases)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          ART_DIR="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$ART_DIR"
          : > "$ART_DIR/stage3-contract-audit.txt"
          audit() { echo "$@" | tee -a "$ART_DIR/stage3-contract-audit.txt"; }
          fail() { echo "FAIL: $*" | tee -a "$ART_DIR/stage3-contract-audit.txt"; exit 1; }
          # mode_of <path> -> octal (e.g. 755); portable across GNU/BSD stat.
          mode_of() {
            stat -c '%a' "$1" 2>/dev/null || stat -f '%Lp' "$1" 2>/dev/null
          }

          echo "=== B6: zapret2 APK file-mode contract ===" | tee -a "$ART_DIR/stage3-contract-audit.txt"
          BC_SH="$(find /tmp/apk-z2 -path '*/opt/zapret2/blockcheck2.sh' -type f -print -quit)"
          [ -n "$BC_SH" ] || fail "blockcheck2.sh not found in zapret2 APK"
          M=$(mode_of "$BC_SH"); audit "blockcheck2.sh mode=$M"
          [ "$M" = "755" ] || fail "blockcheck2.sh mode $M != 755"

          STD_DIR="$(find /tmp/apk-z2 -type d -path '*/blockcheck2.d/standard' -print -quit)"
          CUST_DIR="$(find /tmp/apk-z2 -type d -path '*/blockcheck2.d/custom' -print -quit)"
          [ -n "$STD_DIR" ] || fail "blockcheck2.d/standard tree missing"
          [ -n "$CUST_DIR" ] || fail "blockcheck2.d/custom tree missing"
          audit "standard/custom tree present"

          for s in "$STD_DIR"/*.sh; do
            [ -e "$s" ] || fail "no *.sh in blockcheck2.d/standard"
            M=$(mode_of "$s"); audit "standard/$(basename "$s") mode=$M"
            [ "$M" = "644" ] || fail "standard/$(basename "$s") mode $M != 644"
          done
          for s in "$CUST_DIR"/*.sh; do
            [ -e "$s" ] || fail "no *.sh in blockcheck2.d/custom"
            M=$(mode_of "$s"); audit "custom/$(basename "$s") mode=$M"
            [ "$M" = "644" ] || fail "custom/$(basename "$s") mode $M != 644"
          done
          DEF_INC="$STD_DIR/def.inc"
          [ -f "$DEF_INC" ] || fail "blockcheck2.d/standard/def.inc missing"
          M=$(mode_of "$DEF_INC"); audit "def.inc mode=$M"
          [ "$M" = "644" ] || fail "def.inc mode $M != 644"
          # Custom README/*.txt data files are 0644 (sourced/data, not executed).
          for t in "$CUST_DIR"/README "$CUST_DIR"/*.txt; do
            [ -e "$t" ] || continue
            M=$(mode_of "$t"); audit "$(basename "$t") mode=$M"
            [ "$M" = "644" ] || fail "$(basename "$t") mode $M != 644"
          done

          echo "=== B6: zapret2 release = r3 ===" | tee -a "$ART_DIR/stage3-contract-audit.txt"
          Z2_NAME="${{ steps.locate-apk.outputs.z2_apk_name }}"
          audit "zapret2 apk name: $Z2_NAME"
          echo "$Z2_NAME" | grep -Eq 'zapret2-.*-r3\.apk$' || fail "zapret2 APK release != 3 (name: $Z2_NAME)"
          grep -Eq '^PKG_RELEASE:=3$' "$GITHUB_WORKSPACE/openwrt/zapret2/Makefile" \
            || fail "zapret2 Makefile PKG_RELEASE != 3"
          audit "OK: zapret2 release = r3"

          echo "=== B7: orchestra ready profile set + manifest ===" | tee -a "$ART_DIR/stage3-contract-audit.txt"
          ORCH_PROFILES="$(find /tmp/apk-orch -type d -path '*/usr/share/zapret2-orchestra/profiles' -print -quit)"
          [ -n "$ORCH_PROFILES" ] || fail "orchestra profiles dir missing from APK"
          OPT_COUNT=$(find "$ORCH_PROFILES" -maxdepth 1 -name '*.opt' -type f | wc -l | tr -d ' ')
          audit "orchestra ready .opt count: $OPT_COUNT"
          [ "$OPT_COUNT" = "6" ] || fail "expected exactly 6 ready .opt, got $OPT_COUNT"
          # gui-quic-fake must NOT be a ready/install profile.
          if find "$ORCH_PROFILES" -maxdepth 1 -name 'gui-quic-fake.opt' -type f | grep -q .; then
            fail "gui-quic-fake.opt is present as a ready profile"
          fi
          audit "OK: gui-quic-fake not ready"
          # profiles.tsv present and its IDs match the .opt set exactly.
          MANIFEST="$(find /tmp/apk-orch -path '*/usr/share/zapret2-orchestra/profiles.tsv' -type f -print -quit)"
          [ -f "$MANIFEST" ] || fail "profiles.tsv missing from orchestra APK"
          mapfile -t MAN_IDS < <(awk -F'\t' 'NF>=3 && $1!="id"{print $1}' "$MANIFEST" | sort)
          mapfile -t OPT_IDS < <(find "$ORCH_PROFILES" -maxdepth 1 -name '*.opt' -type f -printf '%f\n' \
            | sed 's/\.opt$//' | sort)
          if [ "${MAN_IDS[*]}" != "${OPT_IDS[*]}" ]; then
            audit "manifest IDs: ${MAN_IDS[*]}"
            audit "opt IDs:      ${OPT_IDS[*]}"
            fail "manifest IDs do not match .opt set"
          fi
          audit "OK: manifest IDs match .opt set"

          echo "=== B7: orchestra CLI script modes 0755 ===" | tee -a "$ART_DIR/stage3-contract-audit.txt"
          for s in zapret2-orchestra-profile zapret2-orchestra-blockcheck; do
            p="$(find /tmp/apk-orch -path "*/usr/sbin/$s" -type f -print -quit)"
            [ -n "$p" ] || fail "$s not found in orchestra APK"
            M=$(mode_of "$p"); audit "$s mode=$M"
            [ "$M" = "755" ] || fail "$s mode $M != 755"
          done

          echo "=== B7: orchestra required ucode + lua assets ===" | tee -a "$ART_DIR/stage3-contract-audit.txt"
          for f in \
            /usr/share/zapret2-orchestra/apply.uc \
            /usr/share/zapret2-orchestra/generate-preload.uc \
            /usr/share/rpcd/ucode/zapret2.orchestra \
            /opt/zapret2/lua/orchestra-extra/init.lua
          do
            grep -F -q "$f" "$ART_DIR/orchestra-files.txt" \
              || fail "$f not found in orchestra APK"
            audit "OK: $f"
          done
          ORCH_LUA_DIR_EXT="$(find /tmp/apk-orch -type d -path '*/opt/zapret2/lua/orchestra-extra' -print -quit)"
          [ -n "$ORCH_LUA_DIR_EXT" ] || fail "orchestra-extra lua dir missing from APK"
          LUA_COUNT=$(find "$ORCH_LUA_DIR_EXT" -maxdepth 1 -name '*.lua' -type f | wc -l | tr -d ' ')
          audit "orchestra-extra/*.lua count: $LUA_COUNT"
          [ "$LUA_COUNT" -ge 6 ] || fail "expected >=6 orchestra-extra lua files, got $LUA_COUNT"
          [ -f "$ORCH_LUA_DIR_EXT/init.lua" ] || fail "orchestra-extra/init.lua missing from APK"

          echo "=== B7: each packaged ready profile has the Orchestra --lua-init ===" | tee -a "$ART_DIR/stage3-contract-audit.txt"
          LUA_INIT='--lua-init=@/opt/zapret2/lua/orchestra-extra/init.lua'
          for o in "$ORCH_PROFILES"/*.opt; do
            n=$(grep -F -c -- "$LUA_INIT" "$o" || true)
            audit "$(basename "$o"): --lua-init count=$n"
            [ "$n" = "1" ] || fail "$(basename "$o"): expected exactly one --lua-init line, got $n"
            # --lua-init must appear before the first circular_quality selector.
            init_ln=$(grep -nF -- "$LUA_INIT" "$o" | head -1 | cut -d: -f1)
            cq_ln=$(grep -nF -- '--lua-desync=circular_quality' "$o" | head -1 | cut -d: -f1)
            [ -n "$init_ln" ] && [ -n "$cq_ln" ] && [ "$init_ln" -lt "$cq_ln" ] \
              || fail "$(basename "$o"): --lua-init must precede first circular_quality"
          done
          # Packaged MVP must contain strategy=1.
          MVP_OPT="$ORCH_PROFILES/orchestra-tls-mvp.opt"
          [ -f "$MVP_OPT" ] || fail "orchestra-tls-mvp.opt missing from APK"
          grep -F -q -- 'strategy=1' "$MVP_OPT" \
            || fail "packaged orchestra-tls-mvp.opt has no strategy=1"
          audit "OK: packaged MVP contains strategy=1"

          echo "=== B7: orchestra release = r5 ===" | tee -a "$ART_DIR/stage3-contract-audit.txt"
          ORCH_NAME="${{ steps.locate-apk.outputs.orch_apk_name }}"
          audit "orchestra apk name: $ORCH_NAME"
          echo "$ORCH_NAME" | grep -Eq 'zapret2-orchestra-.*-r5\.apk$' \
            || fail "orchestra APK release != 5 (name: $ORCH_NAME)"
          grep -Eq '^PKG_RELEASE:=5$' "$GITHUB_WORKSPACE/openwrt/zapret2-orchestra/Makefile" \
            || fail "orchestra Makefile PKG_RELEASE != 5"
          audit "OK: orchestra release = r5"

          echo "=== Stage 3 contract audit PASS ===" | tee -a "$ART_DIR/stage3-contract-audit.txt"

      - name: Verify create_ipset.sh executable mode in APK
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eu
          # The router blocker: create_ipset.sh was installed as 0644
          # (INSTALL_DATA) instead of 0755, causing "Permission denied" in
          # the post-install firewall reload. The Makefile fix uses
          # INSTALL_BIN for ipset/*.sh. Verify the mode inside the built APK.
          IPSET_SH="$(find /tmp/apk-z2 -name create_ipset.sh -type f -print -quit)"
          if [ -z "$IPSET_SH" ]; then
            echo "FAIL: create_ipset.sh not found in zapret2 APK extraction"
            find /tmp/apk-z2 -name '*.sh' 2>/dev/null || true
            exit 1
          fi
          MODE=$(stat -c '%a' "$IPSET_SH" 2>/dev/null || stat -f '%Lp' "$IPSET_SH" 2>/dev/null)
          echo "create_ipset.sh mode: $MODE (path: $IPSET_SH)"
          if [ "$MODE" != "755" ]; then
            echo "FAIL: create_ipset.sh mode is $MODE, expected 755"
            exit 1
          fi
          echo "OK: create_ipset.sh is 0755 in the APK"
          # Also verify def.sh is NOT executable (sourced, not executed).
          DEF_SH="$(find /tmp/apk-z2 -name def.sh -path '*/ipset/*' -type f -print -quit)"
          if [ -n "$DEF_SH" ]; then
            DMODE=$(stat -c '%a' "$DEF_SH" 2>/dev/null || stat -f '%Lp' "$DEF_SH" 2>/dev/null)
            echo "def.sh mode: $DMODE"
            if [ "$DMODE" = "755" ]; then
              echo "WARN: def.sh is executable but upstream marks it 0644 (sourced)"
            fi
          fi

      - name: Collect build log
        if: always()
        run: |
          set +e
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          SDK_PATH="$GITHUB_WORKSPACE/$SDK_DIR"
          if [ ! -d "$SDK_PATH" ]; then
            echo "No OpenWrt build logs found (SDK_DIR $SDK_DIR not present)."
            exit 0
          fi
          HAVE_LOGS=0
          if [ -d "$SDK_PATH/logs" ]; then
            tar -cJf "$GITHUB_WORKSPACE/artifacts/build-logs.tar.xz" -C "$SDK_PATH" logs/
            HAVE_LOGS=1
          fi
          if [ -f "$SDK_PATH/tmp/.packageinfo" ]; then
            cp "$SDK_PATH/tmp/.packageinfo" "$GITHUB_WORKSPACE/artifacts/packageinfo.txt"
          fi
          if [ -d "$SDK_PATH/bin/packages" ]; then
            find "$SDK_PATH/bin/packages" -type f > "$GITHUB_WORKSPACE/artifacts/bin-packages-listing.txt" 2>/dev/null
          fi
          if [ "$HAVE_LOGS" = 0 ]; then
            echo "No OpenWrt build logs found"
          fi
          exit 0

      - name: Copy APKs to artifacts
        if: always() && steps.locate-apk.outcome == 'success'
        run: |
          mkdir -p artifacts
          cp "$GITHUB_WORKSPACE/$SDK_DIR/${{ steps.locate-apk.outputs.orch_apk_path }}" "artifacts/${{ steps.locate-apk.outputs.orch_apk_name }}" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/$SDK_DIR/${{ steps.locate-apk.outputs.z2_apk_path }}" "artifacts/${{ steps.locate-apk.outputs.z2_apk_name }}" 2>/dev/null || true

      - name: Upload APKs
        if: always() && steps.locate-apk.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: zapret2-apks
          path: artifacts/*.apk
          if-no-files-found: warn

      - name: Upload metadata and file lists
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zapret2-metadata
          path: |
            artifacts/orchestra-files.txt
            artifacts/zapret2-files.txt
            artifacts/nfqws2-file-type.txt
            artifacts/nfqws2-readelf.txt
            artifacts/apk-sha256.txt
            artifacts/zapret2-elf-inventory.txt
            artifacts/zapret2-elf-checks.txt
            artifacts/orchestra-elf-inventory.txt
            artifacts/package-manifests.txt
            artifacts/stage3-contract-audit.txt
            artifacts/packageinfo.txt
            artifacts/bin-packages-listing.txt
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zapret2-orchestra-build-logs
          path: artifacts/build-logs.tar.xz
          if-no-files-found: warn
